trf:
  tmin: -0.1           # seconds, receptive-field start (pre-stimulus)
  tmax: 0.600          # seconds, receptive-field end   (post-stimulus)
  ic_clip: 15.0         # unused (no surprisal features for this dataset); kept for schema parity

feature_sets:
  acoustic: ["envelope", "onsets"]
  acoustic_and_surprisal: ["envelope", "onsets"]   # no symbolic score -> no IDyOM-style surprisal for this dataset; degenerates to == acoustic

feature_set_labels:
  acoustic: "Acoustic\n(envelope)"
  acoustic_and_surprisal: "Full\n(+ onsets + surprisal + entropy)"

windowing:
  window_samples: null
  hop_samples: null
