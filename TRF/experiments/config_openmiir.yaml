# config_openmiir.yaml — dataset-specific config for OpenMIIR
# (Stober et al., ISMIR'15; datasets/MIIR/openmiir in this repo).
#
# Structural differences from config.yaml (liberi_dataset) this config
# reflects:
#   - EEG ships as continuous MNE .fif recordings (eeg/mne/{subject}-raw.fif),
#     not pre-segmented CND .mat trials. utils._load_eeg_from_fif segments
#     only the "perception" (condition==1) trials from the STI 014
#     trigger codes (event_id = stimulus_id*10 + condition), and derives
#     each trial's segment length from its own stimulus audio file's
#     duration (sf.info(path).duration) via the corresponding
#     trial_to_stimulus entry below -- NOT a hardcoded per-song-id duration
#     table, since v1/v2 durations genuinely differ for some songs.
#     Channel montage is MNE's built-in 'biosemi64' (a perfect 64/64
#     name match against the .fif scalp channels -- confirmed by direct
#     inspection; no custom/electrode_info.xlsx montage needed). EXG1-EXG6
#     (EOG/extra reference inputs) and STI 014 are excluded from the picked
#     channel list.
#   - No precomputed envelope and no symbolic/MIDI score -- like Daly,
#     stimulus_source_type: audio_files, feature_sets.acoustic_and_surprisal is
#     defined identically to feature_sets.acoustic (no real surprisal features
#     for this dataset), and trial_to_song_id is unused ({}).
#   - Every raw recording actually contains 4 interleaved trial *conditions*
#     per song per repetition (perception / cued imagination / uncued
#     imagination / noise burst), decoded from the stim-channel trigger code
#     `event_id = stimulus_id*10 + condition` (condition: 1=perception,
#     2=cued imagery, 3=uncued imagery, 4=noise). Only condition==1
#     ("perception") trials have real playing audio; the imagery/noise
#     conditions have no stimulus to convolve against and are NOT
#     representable by this envelope-driven TRF pipeline. trial_to_stimulus
#     below lists ONLY the 60 perception-condition events per subject (12
#     songs x 5 repetitions), in recording order.
#   - v1 vs v2 stimulus audio differ genuinely in content (confirmed via
#     `cmp`) for the 5 stimuli present in both audio/full.v1/ and
#     audio/full.v2/ -- subjects P01-P08 were recorded against the v1 set,
#     P09-P14 against v2 (per meta/README.md). trial_to_stimulus paths are
#     resolved per-subject against the correct audio/full.vN/ subdirectory
#     (wav_subdir left empty; each entry below is a full data_root-relative
#     path, e.g. "audio/full.v1/S12_...wav", rather than relying on a single
#     global wav_subdir -- the schema has no per-subject wav_dir override).
#   - No binary musician/non-musician label like liberi_dataset's
#     subject_type -- questionnaire/QuestionnaireScores.xls has a continuous
#     musical-sophistication score (years of training, self-rated items) per
#     participant, not a binary split, and deriving a threshold would be an
#     unreviewed judgment call. subject_type is left "Unknown" for every
#     subject; fill in a real label (or a continuous score under a renamed
#     key) once a musicianship criterion is decided.
#
# See the chat/PR description for the full list of remaining dataset
# constraints (no musician label, fixed presentation order across subjects,
# only 10/14 subjects present locally, etc.).
#
# Relative paths here are resolved against experiments/ itself inside
# config.py's _resolve_paths() -- do NOT put absolute paths here.

paths:
  data_root: "datasets/MIIR_dataset/openmiir"
  wav_subdir: ""   # trial_to_stimulus entries already include audio/full.vN/...
  eeg_subdir: ""   # data_root itself: eeg_filename_pattern already includes eeg/mne/...
  pitch_surprisal_file: "datasets/MIIR_dataset/surprisal_data/mixed2_quantization_24_maxOrder_20_viewpoints_pitch.mat"
  onset_surprisal_file: "datasets/MIIR_dataset/surprisal_data/mixed2_quantization_24_maxOrder_20_viewpoints_length.mat"
  save_dir_template: "results/encoding_openmiir_{date}"
  # No midi_subdir / pitch_surprisal_file / onset_surprisal_file: no
  # symbolic score for this dataset (see stimulus_source_type below).

# Per-subject EEG filename, relative to the resolved eeg_dir (== data_root
# here). `{subject}` is substituted with the OpenMIIR subject id (e.g. 'P01').
# NOTE: '.fif' loading is not yet implemented -- see BLOCKER above.
eeg_filename_pattern: "eeg/mne/{subject}-raw.fif"

stimulus_source_type: audio_files

# Only the 10 subjects whose raw EEG is actually present under
# datasets/MIIR/openmiir/eeg/mne/ (P02, P03, P08, P10 are part of the
# official 10-subject release list elsewhere but their .fif files were never
# placed in this checkout -- confirm before assuming they're excluded by
# design rather than simply not downloaded).
subjects:
  - P01
  # - P04
  # - P05
  # - P06
  # - P07
  # - P09
  # - P11
  # - P12
  # - P13
  # - P14

# PLACEHOLDER -- see header note above: OpenMIIR has no binary
# musician/non-musician label like liberi_dataset. A continuous score exists
# in questionnaire/QuestionnaireScores.xls but turning it into a label
# requires a threshold decision this config doesn't make silently.
subject_type:
  P01: Unknown
  P04: Unknown
  P05: Unknown
  P06: Unknown
  P07: Unknown
  P09: Unknown
  P11: Unknown
  P12: Unknown
  P13: Unknown
  P14: Unknown

# Not applicable (no symbolic score / surprisal features for this dataset).
trial_to_song_id: {}

# One list per subject, one entry per PERCEPTION-condition trial only (60 =
# 12 songs x 5 repetitions each), in recording order -- derived directly from
# each subject's eeg/mne/{subject}-events.mat trigger codes
# (event_id = stimulus_id*10 + condition; kept only where condition == 1),
# sorted by latency, and mapped stimulus_id -> filename via
# meta/Stimuli_Meta.v1.xlsx (P01-P08) / .v2.xlsx (P09-P14). Verified: every
# subject has exactly 48 distinct (stimulus, condition) trigger codes x 5
# repetitions = 240 condition events, of which these 60 per subject are the
# condition==1 subset. Cued/uncued imagery and noise-burst events (the other
# 180 per subject) are intentionally NOT listed here -- they have no
# playable audio and cannot be used by this envelope-driven pipeline.
#
# NOTE: the perception-trial STIMULUS ORDER is identical across all 10
# subjects (only the recording-time latencies differ) -- i.e. presentation
# order was fixed/shared, not independently randomized per subject. This is
# a real property of the release, not a bug in this extraction; flag it if
# order effects matter for downstream analysis (e.g. no per-subject
# counterbalancing to average out serial-position/fatigue confounds).
trial_to_stimulus:
  P01: [audio/full.v1/S12_Take Me Out To The Ballgame_no lyrics.wav, audio/full.v1/S03_Jingle Bells_lyrics.wav, audio/full.v1/S23_Star Wars Theme.wav, audio/full.v1/S13_Jingle Bells_no lyrics.wav, audio/full.v1/S14_Mary Had A Little Lamb_no lyrics.wav, audio/full.v1/S11_Chim Chim Cheree_no lyrics.wav, audio/full.v1/S01_Chim Chim Cheree_lyrics.wav, audio/full.v1/S02_Take Me Out To The Ballgame_lyrics.wav, audio/full.v1/S04_Mary Had A Little Lamb_lyrics.wav, audio/full.v1/S21_EmperorWaltz.wav, audio/full.v1/S22_Harry Potter Theme.wav, audio/full.v1/S24_Eine kleine Nachtmusic.wav, audio/full.v1/S22_Harry Potter Theme.wav, audio/full.v1/S04_Mary Had A Little Lamb_lyrics.wav, audio/full.v1/S11_Chim Chim Cheree_no lyrics.wav, audio/full.v1/S02_Take Me Out To The Ballgame_lyrics.wav, audio/full.v1/S21_EmperorWaltz.wav, audio/full.v1/S13_Jingle Bells_no lyrics.wav, audio/full.v1/S03_Jingle Bells_lyrics.wav, audio/full.v1/S23_Star Wars Theme.wav, audio/full.v1/S12_Take Me Out To The Ballgame_no lyrics.wav, audio/full.v1/S24_Eine kleine Nachtmusic.wav, audio/full.v1/S01_Chim Chim Cheree_lyrics.wav, audio/full.v1/S14_Mary Had A Little Lamb_no lyrics.wav, audio/full.v1/S14_Mary Had A Little Lamb_no lyrics.wav, audio/full.v1/S22_Harry Potter Theme.wav, audio/full.v1/S23_Star Wars Theme.wav, audio/full.v1/S12_Take Me Out To The Ballgame_no lyrics.wav, audio/full.v1/S21_EmperorWaltz.wav, audio/full.v1/S04_Mary Had A Little Lamb_lyrics.wav, audio/full.v1/S11_Chim Chim Cheree_no lyrics.wav, audio/full.v1/S01_Chim Chim Cheree_lyrics.wav, audio/full.v1/S13_Jingle Bells_no lyrics.wav, audio/full.v1/S03_Jingle Bells_lyrics.wav, audio/full.v1/S02_Take Me Out To The Ballgame_lyrics.wav, audio/full.v1/S24_Eine kleine Nachtmusic.wav, audio/full.v1/S04_Mary Had A Little Lamb_lyrics.wav, audio/full.v1/S21_EmperorWaltz.wav, audio/full.v1/S02_Take Me Out To The Ballgame_lyrics.wav, audio/full.v1/S12_Take Me Out To The Ballgame_no lyrics.wav, audio/full.v1/S11_Chim Chim Cheree_no lyrics.wav, aud