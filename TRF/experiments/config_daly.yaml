preprocessing:
  low_frequency: 1     # Hz, HPF cutoff
  high_frequency: 8    # Hz, LPF cutoff
  sfreq: 64            # Hz, target sampling rate after preprocessing/resampling (matches config.yaml's convention)

trf:
  tmin: -0.1           # seconds, receptive-field start (pre-stimulus)
  tmax: 0.600          # seconds, receptive-field end   (post-stimulus)
  ic_clip: 15.0        # unused (no surprisal features for this dataset); kept for schema parity

feature_keys:
  acoustic: ["envelope", "onsets"]
  surprisal: []        # no symbolic score -> no IDyOM-style surprisal for this dataset

windowing:
  window_samples: null
  hop_samples: null
